<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Network Profiler</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin:0; background:#f5f6f8; color:#222; }
  .wrap { max-width: 1040px; margin:0 auto; padding:20px; }
  header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
  h1 { margin:0; font-size:22px; }
  select, a.btn { font-size:14px; padding:6px 10px; border-radius:6px; border:1px solid #ccc; background:#fff; color:#222; text-decoration:none; }
  .verdict { color:#fff; padding:16px 20px; border-radius:10px; margin:16px 0; }
  .verdict .label { display:inline-block; background:rgba(255,255,255,.25); padding:2px 10px; border-radius:20px; font-size:11px; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px;}
  .verdict h2 { margin:0; font-size:18px; }
  .verdict ul { margin:8px 0 0; font-size:14px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
  .stat { background:#fff; border-radius:10px; padding:12px 14px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .stat .k { color:#777; font-size:12px; } .stat .v { font-size:20px; font-weight:600; margin-top:2px; }
  .card { background:#fff; border-radius:10px; padding:14px 16px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:16px; }
  .card h3 { margin:0 0 2px; font-size:16px; } .card .desc { color:#777; font-size:12px; margin-bottom:10px; }
  canvas { max-height:260px; } .nodata { color:#999; font-style:italic; }
  .muted { color:#999; font-size:12px; }
</style></head><body><div class="wrap">
  <header>
    <h1>📶 Network Profiler</h1>
    <div>
      <select id="range" onchange="reload()">
        <option value="6">last 6 h</option>
        <option value="24" selected>last 24 h</option>
        <option value="72">last 3 days</option>
        <option value="168">last 7 days</option>
        <option value="336">last 14 days</option>
      </select>
      <a class="btn" id="reportLink" href="/report?hours=24" target="_blank">Open report ↗</a>
      <a class="btn" id="dlLink" href="/report.html?hours=24">Download</a>
    </div>
  </header>

  <div class="verdict" id="verdict"><h2>Loading…</h2></div>
  <div class="cards" id="stats"></div>
  <div id="charts"></div>
  <p class="muted">Sampling every {{ interval }}s. Internet targets: {{ targets|join(', ') }}. Auto-refreshes every 60s.</p>
</div>
<script>
const palette = ['#e65100','#1565c0','#2e7d32','#6a1b9a','#00838f','#c62828'];
const verdictColors = { healthy:'#2e7d32', wifi:'#e65100', internet:'#c62828', both:'#6a1b9a' };
let charts = [];

function hours() { return document.getElementById('range').value; }

function stat(k, v, unit) {
  const val = (v === null || v === undefined) ? '—' : v + (unit||'');
  return `<div class="stat"><div class="k">${k}</div><div class="v">${val}</div></div>`;
}

async function loadSummary() {
  const s = await (await fetch('/api/summary?hours=' + hours())).json();
  const v = s.verdict;
  const el = document.getElementById('verdict');
  el.style.background = verdictColors[v.label] || '#555';
  let issues = '';
  if (v.wifi_issues.length) issues += '<ul><b>Wifi/local:</b>' + v.wifi_issues.map(x=>`<li>${x}</li>`).join('') + '</ul>';
  if (v.internet_issues.length) issues += '<ul><b>Internet/ISP:</b>' + v.internet_issues.map(x=>`<li>${x}</li>`).join('') + '</ul>';
  const wiredNote = v.wired_note ? `<p style="margin:10px 0 0;font-size:14px;">🔌 ${v.wired_note}</p>` : '';
  el.innerHTML = `<div class="label">${v.label}</div><h2>${v.headline}</h2>${wiredNote}${issues}`;

  document.getElementById('stats').innerHTML =
    stat('Router ping (p95)', s.gateway.ping_p95_ms, ' ms') +
    stat('Internet ping · wifi (p95)', s.internet.ping_p95_ms, ' ms') +
    (s.wired.present ? stat('Internet ping · wired (p95)', s.wired.ping_p95_ms, ' ms') : '') +
    stat('Internet loss · wifi (max)', s.internet.loss_max_pct, ' %') +
    stat('Wifi signal (min)', s.wifi.signal_min_dbm, ' dBm') +
    stat('DNS (median)', s.dns.median_ms, ' ms') +
    stat('Samples', s.sample_count, '') +
    (s.speedtests.count ? stat('Download (median)', s.speedtests.download_median_mbps, ' Mbps') : '') +
    (s.speedtests.count ? stat('Upload (median)', s.speedtests.upload_median_mbps, ' Mbps') : '') +
    (s.speedtests.count ? stat('Speedtest ping (median)', s.speedtests.ping_median_ms, ' ms') : '');
}

async function loadCharts() {
  const data = (await (await fetch('/api/series?hours=' + hours())).json()).charts;
  const host = document.getElementById('charts');
  charts.forEach(c => c.destroy()); charts = []; host.innerHTML = '';
  data.forEach(c => {
    const card = document.createElement('div'); card.className='card';
    card.innerHTML = `<h3>${c.title}</h3><div class="desc">${c.desc}</div>`;
    const total = c.datasets.reduce((n,ds)=>n+ds.data.length,0);
    if (!total) { card.innerHTML += '<p class="nodata">No data yet.</p>'; host.appendChild(card); return; }
    const canvas = document.createElement('canvas'); card.appendChild(canvas); host.appendChild(card);
    charts.push(new Chart(canvas, {
      type:'line',
      data:{ datasets: c.datasets.map((ds,k)=>({ label:ds.label, data:ds.data,
        borderColor:palette[k%palette.length], backgroundColor:palette[k%palette.length],
        borderWidth:1.5, pointRadius:c.pointRadius||0, tension:0.2 })) },
      options:{ responsive:true, animation:false, interaction:{mode:'index',intersect:false},
        scales:{ x:{type:'time', time:{tooltipFormat:'MMM d HH:mm'}}, y:{title:{display:true,text:c.unit}} },
        plugins:{ legend:{position:'bottom'} } },
    }));
  });
}

function reload() {
  const h = hours();
  document.getElementById('reportLink').href = '/report?hours=' + h;
  document.getElementById('dlLink').href = '/report.html?hours=' + h;
  loadSummary(); loadCharts();
}
reload();
setInterval(reload, 60000);
</script></body></html>
